- name: playbook que compare particiones
  hosts: [playbookUsrVar]
  become: true
  vars:
    minimal_available_gb: 2
    paths_to_check:
      - /var
      - /usr
    equal_mount_points: false
    gb_avalible_var_after_download: 0
    teams_webhook_url: "https://outlook.office.com/webhook/" #necesito la URL del webhook de Teams para enviar el informe
  tasks:

    ###############################################################################
    ######  BLOQUE DE OBTENCIÓN DE DATOS DE PUNTOS DE MONTAJE Y CAPACIDAD    ######
    ###############################################################################
    - name: Limpiar cache de paquetes (RedHat)
      ansible.builtin.command: yum clean all
      when: ansible_facts["os_family"] == "RedHat"

    - name: obtener ruta de montaje para cada ruta solicitada
      ansible.builtin.shell: df -h {{ item }} | tail -1 | awk '{print $6}'
      loop: "{{ paths_to_check }}"
      register: mount_results

    - name: obtener capacidad disponible por cada punto de montaje
      ansible.builtin.shell: df -k {{ item.stdout }} | tail -1 | awk '{print $4}'
      loop: "{{ mount_results.results }}"
      register: avail_results
      when: item.stdout is defined

    - name: Descargar actualizaciones de paquetes sin instalar (RedHat)
      ansible.builtin.command: dnf upgrade --downloadonly --refresh -y
      when: ansible_facts["os_family"] == "RedHat"

    - name: obtener capacidad de /var despues de descarga de actualizaciones
      ansible.builtin.shell: df -k {{ item.stdout }} | tail -1 | awk '{print $4}'
      loop: "{{ mount_results.results }}"
      register: after_avail_results
      when: item.stdout is defined

    - name: set gb_avalible_var_after_download
      set_fact:
        gb_avalible_var_after_download: "{{ (item.stdout | int) / 1048576.0 }}"
      loop: "{{ after_avail_results.results }}"
      when: item.item.item == '/var' and after_avail_results is defined

      ##############################################################################
      ######         BLOQUE DE INFORME Y COMPROBACIÓN DE PUNTOS DE MONTAJE    ######
      ##############################################################################
    

    - name: construir informe por ruta
      set_fact:
        paths_report: "{{ paths_report | default([]) + [dict(path=paths_to_check[item_index], mount_point=mount_results.results[item_index].stdout, is_root=(mount_results.results[item_index].stdout == '/'), available=((avail_results.results[item_index].stdout | int) / 1048576.0 if avail_results is defined else 'N/A'))] }}"
      loop: "{{ range(0, paths_to_check | length) | list }}"
      loop_control:
        loop_var: item_index

    - name: comprobar si todos los puntos de montaje son iguales
      set_fact:
        equal_mount_points: "{{ (paths_report | map(attribute='mount_point') | list | unique | length) == 1 }}"

    - name: Construir texto formateado
      set_fact:
        paths_report_formatted: |
          {% for r in paths_report %}
          Punto de montaje de {{ r.path }}: {{ r.mount_point }}
          ¿Está en root?: {{ r.is_root }}
          Capacidad disponible: {{ r.available }}G
          {% endfor %}
          GB disponibles en /var después de descarga: {{ gb_avalible_var_after_download | default('N/A') }}
          ¿Las rutas de montaje son iguales? {{ equal_mount_points }}

    - name: Mostrar información como lista de líneas
      debug:
        msg: "{{ paths_report_formatted.split('\n') }}"

      ############################################################################
      ######         DEBUG DE TAMAÑO                                        ######
      ############################################################################

    - name: comprobar si hay 2G libre en cada ruta si no estan en root
      debug:
        msg: "¿Hay al menos 2G disponibles en {{ item.path }}? {{ item.available | float >= minimal_available_gb }}"
      when: item.is_root == false and not equal_mount_points and item.available != 'N/A'
      loop: "{{ paths_report }}"

    - name: comprobar si hay 2G libre en cada ruta si una de ellas es root
      debug:
        msg: "¿Hay al menos 2G disponibles en {{ item.path }}? {{ item.available | float >= minimal_available_gb }}"
      when: not equal_mount_points and item.is_root == true and item.available != 'N/A'
      loop: "{{ paths_report }}"

    - name: comprobar si hay 4G libre si ambas son root
      debug:
        msg: "¿Hay al menos 4G disponibles en root? {{ item.available | float >= minimal_available_gb * 2 }}"
      when: equal_mount_points and item.available != 'N/A'
      loop: "{{ paths_report }}"

      ############################################################################
      ######         BLOQUES DE TRABAJO DE CADA CASO                        ######
      ############################################################################

#    - name: Caso A — Ninguna ruta es root (comprobar 2G en cada una)
#      block:
#        - name: Verificar >= 2G en cada ruta no-root
#          # TODO
#          when: item.available != 'N/A'
#      when: not equal_mount_points and (paths_report | selectattr('is_root','equalto',False) | list | length == (paths_report | length))

#    - name: Caso B — Una de las rutas es root (comprobar 2G en cada una)
#     block:
#       - name: Verificar >= 2G en cada ruta (incluye root)
#          # TODO
#          loop: "{{ paths_report }}"
#          when: item.available != 'N/A'
#      when: not equal_mount_points and (paths_report | selectattr('is_root','equalto',True) | list | length == 1)

#    - name: Caso C — Ambas rutas comparten el mismo punto de montaje (root) (comprobar 4G)
#      block:
#        - name: Verificar >= 4G en el punto de montaje común (root)
#          # TODO
#          loop: "{{ paths_report }}"
#          when: item.available != 'N/A'
#      when: equal_mount_points

    ############################################################################
    ######         BLOQUES DE INFORME POR TEAMS                           ######
    ############################################################################

    - name: Construir informe formateado como lista (Forma A)
      set_fact:
        paths_report_lines: |
          {% for r in paths_report %}
          Ruta comprobada: {{ r.path }}
          Punto de montaje: {{ r.mount_point }}
          Es root: {{ r.is_root }}
          Capacidad disponible: {{ r.available }}G
          GB disponibles en /var después de descarga: {{ gb_avalible_var_after_download | default('N/A') }}
          ---
          {% endfor %}
          ¿Las rutas de montaje son iguales? {{ equal_mount_points }}

    - name: Convertir texto en lista de líneas (sin \n)
      set_fact:
        paths_report_list: "{{ paths_report_lines.split('\n') }}"

    - name: Enviar informe a Teams
      uri:
        url: "{{ teams_webhook_url }}"
        method: POST
        headers:
          Content-Type: "application/json"
        body:
          title: "Informe de puntos de montaje para {{ inventory_hostname }}"
          text: "{{ paths_report_list | join('\n') }}"
        body_format: json
      delegate_to: localhost
      register: teams_result
      retries: 3
      delay: 5
      until: teams_result.status is defined and teams_result.status | int >= 200 and teams_result.status | int < 300
      ignore_errors: false