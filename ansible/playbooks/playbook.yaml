- name: playbook que compare particiones
  hosts: [playbookUsrVar]
  become: true
  vars:
    minimal_available_gb: 4
    display_decimals: 2
    paths_to_check:
      - /var
      - /usr
    equal_mount_points: false
    update_packages: false
    estimated_download_gb: 0
    teams_webhook_url: "https://kyndryl.webhook.office.com/webhookb2/b78cf8ee-1583-4a5a-b33c-e76914257a84@f260df36-bc43-424c-8f44-c85226657b01/IncomingWebhook/bbdf7c56b7174d7eb15bf20979b4b642/2d8022cc-99b2-4610-a942-d364956ad5be/V2_1uVD902Aw2qGsCxM-AivcQrKyiQ4MFSbo7MrfMrvLY1" #necesito la URL del webhook de Teams para enviar el informe
  tasks:

    ###############################################################################
    ######  BLOQUE DE OBTENCIÓN DE DATOS DE PUNTOS DE MONTAJE Y CAPACIDAD    ######
    ###############################################################################
    - name: Limpiar cache de paquetes (RedHat)
      ansible.builtin.command: yum clean all
      when: ansible_facts["os_family"] == "RedHat"

    - name: obtener ruta de montaje para cada ruta solicitada
      ansible.builtin.shell: LANG=C df -h {{ item }} | tail -1 | awk '{print $6}'
      loop: "{{ paths_to_check }}"
      register: mount_results

    - name: obtener capacidad disponible por cada punto de montaje
      ansible.builtin.shell: LANG=C df -k {{ item.stdout }} | tail -1 | awk '{print $4}'
      loop: "{{ mount_results.results }}"
      register: avail_results
      when: item.stdout is defined

    - name: obtener tamaño estimado de descarga de paquetes
      ansible.builtin.shell: LANG=C dnf upgrade --assumeno | grep -E "size:" | awk '{print $4 " " $5}'
      register: download_size_raw
      when: ansible_facts["os_family"] == "RedHat"

    - name: set estimated_download_gb (MB -> GB)
      set_fact:
        estimated_download_gb: "{{ (download_size_raw.stdout.split()[0] | float / 1024.0) | round(display_decimals) }}"
      when: download_size_raw is defined and download_size_raw.stdout != '' and 'M' in download_size_raw.stdout

    - name: set estimated_download_gb (GB)
      set_fact:
        estimated_download_gb: "{{ (download_size_raw.stdout.split()[0] | float) | round(display_decimals) }}"
      when: download_size_raw is defined and download_size_raw.stdout != '' and 'G' in download_size_raw.stdout

    - name: set estimated_download_gb (fallback)
      set_fact:
        estimated_download_gb: "{{ (download_size_raw.stdout.split()[0] | float) | round(display_decimals) }}"
      when: download_size_raw is defined and download_size_raw.stdout != '' and ('M' not in download_size_raw.stdout and 'G' not in download_size_raw.stdout)

    - name: Formatear estimated_download_gb como string con decimales
      set_fact:
        estimated_download_gb_str: "{{ ('%.' ~ display_decimals ~ 'f') % (estimated_download_gb | float) }}"
      when: estimated_download_gb is defined

    
    - name: Descargar actualizaciones de paquetes sin instalar (RedHat)
      ansible.builtin.command: dnf upgrade --downloadonly --refresh -y
      when: ansible_facts["os_family"] == "RedHat" and update_packages and (paths_report | selectattr('path','equalto','/var') | map(attribute='available') | first | float) >= minimal_available_gb

      ##############################################################################
      ######         BLOQUE DE INFORME Y COMPROBACIÓN DE PUNTOS DE MONTAJE    ######
      ##############################################################################
    

    - name: construir informe por ruta
      set_fact:
        paths_report: "{{ paths_report | default([]) + [dict(path=paths_to_check[item_index], mount_point=mount_results.results[item_index].stdout, is_root=(mount_results.results[item_index].stdout == '/'), available=(( (avail_results.results[item_index].stdout | int) / 1048576.0 ) | round(display_decimals) if avail_results is defined else 'N/A'), available_str=(('%.' ~ display_decimals ~ 'f') % (((avail_results.results[item_index].stdout | int) / 1048576.0) | float) if avail_results is defined else 'N/A'))] }}"
      loop: "{{ range(0, paths_to_check | length) | list }}"
      loop_control:
        loop_var: item_index

    - name: comprobar si todos los puntos de montaje son iguales
      set_fact:
        equal_mount_points: "{{ (paths_report | map(attribute='mount_point') | list | unique | length) == 1 }}"

    - name: Construir texto formateado
      set_fact:
        paths_report_formatted: |
          {% for r in paths_report %}
          Punto de montaje de {{ r.path }}: {{ r.mount_point }}
          ¿Hay suficiente espacio?: {{ (r.available | float) >= minimal_available_gb }}
          ¿Está en root?: {{ r.is_root }}
          Capacidad disponible: {{ r.available_str }}G
          
          {% endfor %}
          GB estimados a descargar: {{ estimated_download_gb_str | default(estimated_download_gb | default('N/A')) }}G
          ¿Las rutas de montaje son iguales? {{ equal_mount_points }}

    - name: Mostrar información como lista de líneas
      debug:
        msg: "{{ paths_report_formatted.split('\n') }}"

      ############################################################################
      ######         DEBUG DE TAMAÑO                                        ######
      ############################################################################

#    - name: comprobar si hay 2G libre en cada ruta si no estan en root
